name: Armbian MSM8916 Rebuild Workflows

on:
  workflow_dispatch:
    inputs:
      target_device:
        description: "选择要编译的设备型号"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - ufi001c
          - ufi003
      retry_count:
        description: "网络下载失败时的最大重试次数"
        required: false
        default: "3"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "5"

permissions:
  contents: write

jobs:
  get-versions:
    name: 📋 获取 Armbian 版本列表
    runs-on: ubuntu-latest
    outputs:
      matrix: "${{ steps.set-matrix.outputs.matrix }}"
      tag_name: "${{ steps.set-tag.outputs.tag_name }}"
    steps:
      - name: 🔍 从 ophub 仓库获取最新 Armbian 版本
        id: set-matrix
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          echo "════════════════════════════════════════════════"
          echo "  正在从 ophub/amlogic-s9xxx-armbian 获取版本列表"
          echo "════════════════════════════════════════════════"

          REPO="ophub/amlogic-s9xxx-armbian"
          API_URL="https://api.github.com/repos/${REPO}/releases?per_page=30"
          MAX_RETRY=${{ inputs.retry_count }}
          RETRY=0
          while [ $RETRY -lt $MAX_RETRY ]; do
            RESPONSE=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" "${API_URL}")
            if echo "$RESPONSE" | jq -e '. | type == "array"' >/dev/null 2>&1; then
              echo "✅ GitHub API 响应正常"
              break
            fi
            RETRY=$((RETRY + 1))
            echo "⚠️  第 ${RETRY}/${MAX_RETRY} 次重试中..."
            sleep 5
          done

          if ! echo "$RESPONSE" | jq -e '. | type == "array"' >/dev/null 2>&1; then
            echo "❌ 错误: GitHub API 返回无效数据，已重试 ${MAX_RETRY} 次"
            echo "$RESPONSE" | head -n 10 || true
            exit 1
          fi

          echo "$RESPONSE" > response.json
          VERSIONS=$(echo "$RESPONSE" | jq -r '.[] | select(.tag_name | contains("arm64")) | .tag_name' | head -n 10)

          if [ -z "$VERSIONS" ]; then
            echo "❌ 错误: 未找到任何包含 arm64 的版本"
            exit 1
          fi

          echo "📦 找到以下 arm64 版本:"
          echo "$VERSIONS"

          VERSION_CODES=""
          while IFS= read -r tag; do
            if [[ $tag =~ ^Armbian_([a-zA-Z0-9]+)_arm64 ]]; then
              version_code="${BASH_REMATCH[1]}"
              if [[ -n "$version_code" && ! "$VERSION_CODES" =~ (^|[[:space:]])$version_code($|[[:space:]]) ]]; then
                VERSION_CODES="$VERSION_CODES $version_code"
              fi
            fi
          done <<< "$VERSIONS"

          VERSION_CODES=$(echo $VERSION_CODES | tr ' ' '\n' | sort -u | tr '\n' ' ')

          if [ -z "$VERSION_CODES" ]; then
            echo "❌ 错误: 无法提取有效版本代码"
            exit 1
          fi

          JSON_ARRAY="["
          first=true
          for ver in $VERSION_CODES; do
            if [ "$first" = true ]; then
              JSON_ARRAY="${JSON_ARRAY}\"${ver}\""
              first=false
            else
              JSON_ARRAY="${JSON_ARRAY},\"${ver}\""
            fi
          done
          JSON_ARRAY="${JSON_ARRAY}]"

          echo "✅ 生成编译矩阵: ${JSON_ARRAY}"
          echo "matrix=${JSON_ARRAY}" >> $GITHUB_OUTPUT

      - name: 🏷️ 生成统一发布标签（时间戳格式）
        id: set-tag
        run: |
          TAG_NAME=$(date +%Y.%m.%d-%H%M)
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "✅ 本次发布标签: ${TAG_NAME}"
          echo "目标设备: ${{ inputs.target_device }}"
          echo "最大重试: ${{ inputs.retry_count }} 次"

  build:
    name: "🔨 构建 [${{ matrix.version }}] → ${{ inputs.target_device }}"
    needs: get-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: "${{ fromJson(needs.get-versions.outputs.matrix) }}"
      fail-fast: false

    steps:
      # ── 步骤 1 ──────────────────────────────────────────────
      - name: 📥 检出本仓库代码（获取 common-file、modem 目录）
        uses: actions/checkout@v4

      # ── 步骤 2 ──────────────────────────────────────────────
      - name: 🛠️ 安装系统依赖工具包
        run: |
          echo "════════════════════════════════════════════════"
          echo "  正在安装编译和打包所需的全部系统依赖"
          echo "════════════════════════════════════════════════"
          MAX_RETRY=${{ inputs.retry_count }}
          for i in $(seq 1 $MAX_RETRY); do
            sudo apt-get update && break
            echo "⚠️  apt update 第 ${i}/${MAX_RETRY} 次重试..."
            sleep 10
          done

          set -euxo pipefail
          sudo apt-get install -y \
            git curl wget unzip rsync bc bison flex build-essential \
            libssl-dev libelf-dev libdw-dev libncurses-dev pahole cpio \
            fakeroot dpkg-dev debhelper devscripts equivs kmod xz-utils \
            zstd python3 e2fsprogs fdisk util-linux android-sdk-libsparse-utils \
            qemu-user-static jq

          echo "════ 替换 mkbootimg 为指定版本 ════"
          sudo apt-get purge -y mkbootimg || true
          sudo rm -f /usr/bin/mkbootimg /usr/local/bin/mkbootimg

          MKBOOTIMG_URL="https://android.googlesource.com/platform/system/tools/mkbootimg/+/9c46d9eee9a1b469ccf46db917ac78fc9f0fdaf1/mkbootimg.py?format=TEXT"
          for i in $(seq 1 $MAX_RETRY); do
            sudo wget -q "${MKBOOTIMG_URL}" -O /tmp/mkbootimg.b64 && break
            echo "⚠️  mkbootimg 下载第 ${i}/${MAX_RETRY} 次重试..."
            sleep 10
          done
          base64 -d /tmp/mkbootimg.b64 > /tmp/mkbootimg
          sudo chmod +x /tmp/mkbootimg
          sudo mv /tmp/mkbootimg /usr/local/bin/mkbootimg
          echo "✅ mkbootimg 安装完成"

      # ── 步骤 3 ──────────────────────────────────────────────
      - name: 📦 下载原始 Armbian 基础镜像（版本 ${{ matrix.version }}）
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          echo "════════════════════════════════════════════════"
          echo "  目标版本: ${{ matrix.version }}"
          echo "  来源仓库: ophub/amlogic-s9xxx-armbian"
          echo "════════════════════════════════════════════════"

          REPO="ophub/amlogic-s9xxx-armbian"
          API_URL="https://api.github.com/repos/${REPO}/releases"
          SELECTED_VER="${{ matrix.version }}"
          MAX_RETRY=${{ inputs.retry_count }}

          for i in $(seq 1 $MAX_RETRY); do
            RELEASES_JSON=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" "${API_URL}")
            FULL_TAG=$(echo "$RELEASES_JSON" | jq -r ".[] | select(.tag_name | contains(\"${SELECTED_VER}\") and contains(\"arm64\")) | .tag_name" | head -n 1)
            [ -n "${FULL_TAG}" ] && [ "${FULL_TAG}" != "null" ] && break
            echo "⚠️  获取 Release 列表第 ${i}/${MAX_RETRY} 次重试..."
            sleep 10
          done

          if [ -z "${FULL_TAG}" ] || [ "${FULL_TAG}" = "null" ]; then
            echo "❌ 错误: 未找到版本 ${SELECTED_VER} 对应的 arm64 Release"
            exit 1
          fi
          echo "✅ 找到完整 Tag: ${FULL_TAG}"

          ASSETS_JSON=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" "${API_URL}/tags/${FULL_TAG}")
          TRUNK_FILE=$(echo "$ASSETS_JSON" | jq -r '.assets[] | select(.name | test("trunk.*\\.(img|gz|xz|zip)$")) | .name' | head -n 1)
          if [ -z "${TRUNK_FILE}" ] || [ "${TRUNK_FILE}" = "null" ]; then
            TRUNK_FILE=$(echo "$ASSETS_JSON" | jq -r '.assets[] | select(.name | test("\\.(img|gz|xz|zip)$")) | .name' | head -n 1)
          fi

          if [ -z "${TRUNK_FILE}" ] || [ "${TRUNK_FILE}" = "null" ]; then
            echo "❌ 错误: 未找到可下载的镜像文件"
            exit 1
          fi

          echo "📦 目标文件: ${TRUNK_FILE}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${FULL_TAG}/${TRUNK_FILE}"

          for i in $(seq 1 $MAX_RETRY); do
            wget -q --show-progress -c "${DOWNLOAD_URL}" -O "${TRUNK_FILE}" && break
            echo "⚠️  镜像下载第 ${i}/${MAX_RETRY} 次重试..."
            rm -f "${TRUNK_FILE}"
            sleep 15
          done

          if [ ! -f "${TRUNK_FILE}" ] || [ ! -s "${TRUNK_FILE}" ]; then
            echo "❌ 错误: 镜像下载失败或文件为空"
            exit 1
          fi

          echo "🔓 正在解压镜像..."
          if [[ "$TRUNK_FILE" == *.gz ]]; then
            gunzip -k "${TRUNK_FILE}" 2>/dev/null || gunzip "${TRUNK_FILE}"
            IMGFILE="${TRUNK_FILE%.gz}"
          elif [[ "$TRUNK_FILE" == *.xz ]]; then
            xz -d "${TRUNK_FILE}"
            IMGFILE="${TRUNK_FILE%.xz}"
          else
            IMGFILE="$TRUNK_FILE"
          fi

          mv "${IMGFILE}" armbian.img
          echo "✅ 基础镜像准备完成: armbian.img ($(du -sh armbian.img | cut -f1))"

      # ── 步骤 4 ──────────────────────────────────────────────
      - name: ⚙️ 下载 MSM8916 专用内核组件（来自本仓库 kernel_stable）
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          echo "════════════════════════════════════════════════"
          echo "  来源: 本仓库 Release tag: kernel_stable"
          echo "════════════════════════════════════════════════"

          mkdir -p kernel_debs
          cd kernel_debs
          MAX_RETRY=${{ inputs.retry_count }}
          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/kernel_stable"

          for i in $(seq 1 $MAX_RETRY); do
            KERNEL_ASSETS_JSON=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" "${API_URL}")
            KERNEL_TAR_URL=$(echo "$KERNEL_ASSETS_JSON" | jq -r \
              '.assets[] | select(.name | test("^[0-9]+\\.[0-9]+\\.[0-9]+\\.tar\\.gz$")) | .browser_download_url' \
              | head -n 1)
            [ -n "${KERNEL_TAR_URL}" ] && [ "${KERNEL_TAR_URL}" != "null" ] && break
            echo "⚠️  获取内核包信息第 ${i}/${MAX_RETRY} 次重试..."
            sleep 10
          done

          if [ -z "${KERNEL_TAR_URL}" ] || [ "${KERNEL_TAR_URL}" = "null" ]; then
            echo "❌ 错误: 未找到 kernel_stable 中的内核 tar.gz 包"
            echo "   请先运行 compile-msm8916-kernel.yml 生成内核"
            exit 1
          fi

          for i in $(seq 1 $MAX_RETRY); do
            wget -q --show-progress "${KERNEL_TAR_URL}" -O kernel-package.tar.gz && break
            echo "⚠️  内核包下载第 ${i}/${MAX_RETRY} 次重试..."
            rm -f kernel-package.tar.gz
            sleep 15
          done

          if [ ! -f kernel-package.tar.gz ] || [ ! -s kernel-package.tar.gz ]; then
            echo "❌ 错误: 内核包下载失败"
            exit 1
          fi

          echo "🔓 解压内核包..."
          tar -xzvf kernel-package.tar.gz

          IMAGE_DEB=$(find . -name "*image*.deb" ! -name "linux-image.deb" | head -n 1)
          [ -n "$IMAGE_DEB" ] && mv "$IMAGE_DEB" linux-image.deb && echo "✅ linux-image.deb 整理完成" || echo "✅ linux-image.deb 已存在"

          HEADERS_DEB=$(find . -name "*headers*.deb" ! -name "linux-headers.deb" | head -n 1)
          [ -n "$HEADERS_DEB" ] && mv "$HEADERS_DEB" linux-headers.deb && echo "✅ linux-headers.deb 整理完成" || echo "✅ linux-headers.deb 已存在"

          IMG_GZ=$(find . -name "Image.gz" | head -n 1)
          if [ -z "$IMG_GZ" ]; then
            ALT_IMG_GZ=$(find . -name "*Image*.gz" | head -n 1)
            [ -n "$ALT_IMG_GZ" ] && mv "$ALT_IMG_GZ" Image.gz
          fi
          [ -f "Image.gz" ] && echo "✅ Image.gz 已就位" || { echo "❌ Image.gz 缺失！"; exit 1; }

          DTB_FILE=$(find . -name "*ufi001c*.dtb" ! -name "msm8916-thwc-ufi001c.dtb" | head -n 1)
          [ -n "$DTB_FILE" ] && mv "$DTB_FILE" msm8916-thwc-ufi001c.dtb && echo "✅ DTB 整理完成" || echo "✅ DTB 已存在"
          [ -f "msm8916-thwc-ufi001c.dtb" ] || { echo "❌ DTB 文件缺失！"; exit 1; }

          rm -f kernel-package.tar.gz
          cd ..
          echo "════ 内核组件最终清单 ════"
          ls -lh kernel_debs/

      # ── 步骤 5 ──────────────────────────────────────────────
      - name: 📂 复制设备专属固件包（来自本仓库 modem/ 目录）
        run: |
          echo "════════════════════════════════════════════════"
          echo "  来源: 本仓库 modem/ 目录"
          echo "  目标设备: ${{ inputs.target_device }}"
          echo "════════════════════════════════════════════════"
          mkdir -p firmware_debs
          TARGET="${{ inputs.target_device }}"

          if [[ "$TARGET" == "ufi001c" || "$TARGET" == "both" ]]; then
            if cp modem/firmware-ufi001c.deb firmware_debs/ 2>/dev/null; then
              echo "✅ firmware-ufi001c.deb 已复制"
            else
              echo "⚠️  modem/firmware-ufi001c.deb 不存在，UFI001C 将跳过固件安装"
            fi
          fi

          if [[ "$TARGET" == "ufi003" || "$TARGET" == "both" ]]; then
            if cp modem/firmware-ufi003.deb firmware_debs/ 2>/dev/null; then
              echo "✅ firmware-ufi003.deb 已复制"
            else
              echo "⚠️  modem/firmware-ufi003.deb 不存在，UFI003 将跳过固件安装"
            fi
          fi

          ls -lh firmware_debs/ || echo "（无固件包）"

      # ── 步骤 6 ──────────────────────────────────────────────
      - name: 🏗️ 构建公共 Rootfs 基础层（调用 common-file/chroot.sh）
        run: |
          echo "════════════════════════════════════════════════"
          echo "  构建公共底层 rootfs（两个设备共享此基础层）"
          echo "  chroot 脚本来源: common-file/chroot.sh"
          echo "════════════════════════════════════════════════"

          # ================================================================
          # 验证 chroot.sh 是否存在于本仓库 common-file 目录
          # ================================================================
          if [ ! -f "common-file/chroot.sh" ]; then
            echo "❌ 错误: common-file/chroot.sh 不存在！"
            echo "   请确认仓库中存在该文件"
            exit 1
          fi
          echo "✅ 确认 common-file/chroot.sh 存在"

          sudo -E bash -c '
          set -euo pipefail

          SCRIPT_DIR="$(pwd)"
          ORIG_DIR="${SCRIPT_DIR}/original_image"
          TEMP_DIR="${SCRIPT_DIR}/temp_common"
          TEMP_IMG="${SCRIPT_DIR}/temp_common.img"
          ORIGINAL_IMG="${SCRIPT_DIR}/armbian.img"

          mkdir -p "${ORIG_DIR}" "${TEMP_DIR}"

          echo "📐 计算镜像所需空间..."
          LOOP_DEV=$(losetup -f --show "${ORIGINAL_IMG}")
          sleep 1
          partprobe "${LOOP_DEV}" 2>/dev/null || true
          LOOP_PART="${LOOP_DEV}p1"
          [[ ! -b "${LOOP_PART}" ]] && LOOP_PART="${LOOP_DEV}1"

          mount "${LOOP_PART}" "${ORIG_DIR}"
          bytes=$(du -sb "${ORIG_DIR}" 2>/dev/null | cut -f1)
          ORIG_SIZE=$(( (bytes / 1024 / 1024) + (bytes / 1024 / 1024 / 5) + 64 ))
          EXTRA_SIZE=512
          TEMP_SIZE=$((ORIG_SIZE + EXTRA_SIZE))
          OUTPUT_SIZE=$((ORIG_SIZE + EXTRA_SIZE + 128))
          echo "✅ 原始:${ORIG_SIZE}MB 临时:${TEMP_SIZE}MB 输出:${OUTPUT_SIZE}MB"
          echo "${OUTPUT_SIZE}" > /tmp/output_size.txt

          umount "${ORIG_DIR}"
          losetup -d "${LOOP_DEV}"

          echo "💾 创建临时 Btrfs 工作镜像..."
          dd if=/dev/zero of="${TEMP_IMG}" bs=1M count=${TEMP_SIZE} status=progress
          mkfs.btrfs -f "${TEMP_IMG}"

          LOOP_DEV=$(losetup -f --show "${ORIGINAL_IMG}")
          partprobe "${LOOP_DEV}" 2>/dev/null || true
          LOOP_PART="${LOOP_DEV}p1"
          [[ ! -b "${LOOP_PART}" ]] && LOOP_PART="${LOOP_DEV}1"

          mount -t btrfs -o compress=zstd:15 "${TEMP_IMG}" "${TEMP_DIR}"
          mount "${LOOP_PART}" "${ORIG_DIR}"

          echo "📋 复制原始 rootfs 到工作目录..."
          cp -a "${ORIG_DIR}/." "${TEMP_DIR}/"

          # ================================================================
          # 准备 chroot 内的 /tmp/local_packages 目录
          # 注意：chroot.sh 中 PKGS_DIR="/tmp/local_packages"
          # 所有 deb 包和脚本文件都必须复制到这里
          # ================================================================
          mkdir -p "${TEMP_DIR}/tmp/local_packages"

          echo "📋 复制内核 deb 包..."
          if ls "${SCRIPT_DIR}/kernel_debs/"*.deb >/dev/null 2>&1; then
            cp "${SCRIPT_DIR}/kernel_debs/"*.deb "${TEMP_DIR}/tmp/local_packages/"
            echo "✅ 内核包已复制"
          else
            echo "⚠️  未找到内核 deb 包"
          fi

          echo "📋 复制 common-file 目录内容（包含 chroot.sh 和所有脚本）..."
          if [ -d "${SCRIPT_DIR}/common-file" ]; then
            cp -a "${SCRIPT_DIR}/common-file/." "${TEMP_DIR}/tmp/local_packages/"
            echo "✅ common-file 内容已复制到 /tmp/local_packages/"
            echo "   复制内容清单:"
            ls -la "${TEMP_DIR}/tmp/local_packages/" | sed "s/^/   /"
          else
            echo "❌ common-file 目录不存在！"
            exit 1
          fi

          chmod 1777 "${TEMP_DIR}/tmp"

          # ================================================================
          # ★ 关键修复：在挂载 chroot 之前，从宿主机侧强制处理 resolv.conf
          #   Bookworm 中 /etc/resolv.conf 是损坏的符号链接
          #   必须在宿主机侧先删除再写入真实文件
          # ================================================================
          echo "🔧 预修复 chroot 内的 resolv.conf（防止 Bookworm 符号链接问题）..."
          rm -f "${TEMP_DIR}/etc/resolv.conf"
          printf "nameserver 223.5.5.5\nnameserver 119.29.29.29\n" \
            > "${TEMP_DIR}/etc/resolv.conf"
          echo "✅ resolv.conf 已写入真实文件"

          echo "🔗 挂载虚拟文件系统到 chroot..."
          mount --bind /proc "${TEMP_DIR}/proc"
          mount --bind /dev "${TEMP_DIR}/dev"
          mount --bind /dev/pts "${TEMP_DIR}/dev/pts"
          mount --bind /sys "${TEMP_DIR}/sys"
          echo "✅ chroot 环境挂载完成"

          # ================================================================
          # ★ 核心修改：直接调用仓库中的 chroot.sh
          #   路径: common-file/chroot.sh → 已复制到
          #         ${TEMP_DIR}/tmp/local_packages/chroot.sh
          #   在 chroot 内路径为: /tmp/local_packages/chroot.sh
          # ================================================================
          echo ""
          echo "🚀 进入 chroot，调用 common-file/chroot.sh 执行系统重构..."
          chmod +x "${TEMP_DIR}/tmp/local_packages/chroot.sh"
          chroot "${TEMP_DIR}" /tmp/local_packages/chroot.sh
          echo "✅ chroot.sh 执行完成"

          echo "🔍 提取 initrd 镜像..."
          INITRD_PATH=$(ls -1 "${TEMP_DIR}/boot"/initrd.img-* 2>/dev/null | head -n 1 || echo "")
          if [ -n "${INITRD_PATH}" ]; then
            cp "${INITRD_PATH}" "${SCRIPT_DIR}/initrd_ufi001c.img"
            cp "${SCRIPT_DIR}/initrd_ufi001c.img" "${SCRIPT_DIR}/initrd_ufi003.img"
            echo "✅ initrd 提取完成: $(basename ${INITRD_PATH})"
          else
            echo "❌ 错误: 未找到 initrd.img，内核安装可能失败！"
            echo "   /boot 目录内容:"
            ls -la "${TEMP_DIR}/boot/" || true
            exit 1
          fi

          umount "${TEMP_DIR}/proc" "${TEMP_DIR}/dev/pts" "${TEMP_DIR}/dev" "${TEMP_DIR}/sys" || true
          umount "${ORIG_DIR}" || true
          losetup -d "${LOOP_DEV}" || true
          echo "✅ 公共基础层构建完成，已卸载所有挂载点"

          OUTPUT_SIZE=$(cat /tmp/output_size.txt)
          TARGET_DEVICE="${{ inputs.target_device }}"

          # ── UFI001C 分支构建 ──
          if [[ "$TARGET_DEVICE" == "ufi001c" || "$TARGET_DEVICE" == "both" ]]; then
            echo ""
            echo "════════════════════════════════════════════════"
            echo "  🌿 开始构建 UFI001C 专属固件"
            echo "════════════════════════════════════════════════"
            OUTPUT_IMG_001C="${SCRIPT_DIR}/armbian-msm8916-ufi001c.img"
            BUILD_DIR_001C="${SCRIPT_DIR}/build_ufi001c"
            mkdir -p "${BUILD_DIR_001C}"

            dd if=/dev/zero of="${OUTPUT_IMG_001C}" bs=1M count=${OUTPUT_SIZE} status=progress
            mkfs.btrfs -f "${OUTPUT_IMG_001C}"
            mount -t btrfs -o compress=zstd:15 "${OUTPUT_IMG_001C}" "${BUILD_DIR_001C}"
            echo "📋 复制公共基础层到 UFI001C..."
            cp -a "${TEMP_DIR}/." "${BUILD_DIR_001C}/"

            if [ -f "${SCRIPT_DIR}/firmware_debs/firmware-ufi001c.deb" ]; then
              echo "📦 安装 UFI001C 专属固件..."
              cp "${SCRIPT_DIR}/firmware_debs/firmware-ufi001c.deb" "${BUILD_DIR_001C}/tmp/"

              # 修复 UFI001C chroot 的 resolv.conf
              rm -f "${BUILD_DIR_001C}/etc/resolv.conf"
              printf "nameserver 223.5.5.5\nnameserver 119.29.29.29\n" \
                > "${BUILD_DIR_001C}/etc/resolv.conf"

              mount --bind /proc "${BUILD_DIR_001C}/proc"
              mount --bind /dev "${BUILD_DIR_001C}/dev"
              mount --bind /sys "${BUILD_DIR_001C}/sys"

              for i in 1 2 3; do
                if chroot "${BUILD_DIR_001C}" bash -c "dpkg -i /tmp/firmware-ufi001c.deb"; then
                  echo "✅ UFI001C 固件安装成功"
                  break
                fi
                echo "⚠️  固件安装第 ${i}/3 次重试..."
                chroot "${BUILD_DIR_001C}" bash -c "apt-get --fix-broken install -y" || true
                # 每次重试后修复 resolv.conf
                rm -f "${BUILD_DIR_001C}/etc/resolv.conf"
                printf "nameserver 223.5.5.5\nnameserver 119.29.29.29\n" \
                  > "${BUILD_DIR_001C}/etc/resolv.conf"
              done

              umount "${BUILD_DIR_001C}/proc" "${BUILD_DIR_001C}/dev" "${BUILD_DIR_001C}/sys" || true
            else
              echo "⚠️  未找到 firmware-ufi001c.deb，跳过固件安装"
            fi

            chroot "${BUILD_DIR_001C}" bash -c \
              "rm -rf /var/lib/apt/lists/* && apt-get clean all" || true
            rm -rf "${BUILD_DIR_001C}/tmp"/*
            umount "${BUILD_DIR_001C}"
            img2simg "${OUTPUT_IMG_001C}" "${SCRIPT_DIR}/rootfs_ufi001c.img"
            echo "✅ UFI001C rootfs 构建完成"
          else
            echo "ℹ️  已跳过 UFI001C（目标设备: ${TARGET_DEVICE}）"
          fi

          # ── UFI003 分支构建 ──
          if [[ "$TARGET_DEVICE" == "ufi003" || "$TARGET_DEVICE" == "both" ]]; then
            echo ""
            echo "════════════════════════════════════════════════"
            echo "  🌿 开始构建 UFI003 专属固件"
            echo "════════════════════════════════════════════════"
            OUTPUT_IMG_003="${SCRIPT_DIR}/armbian-msm8916-ufi003.img"
            BUILD_DIR_003="${SCRIPT_DIR}/build_ufi003"
            mkdir -p "${BUILD_DIR_003}"

            dd if=/dev/zero of="${OUTPUT_IMG_003}" bs=1M count=${OUTPUT_SIZE} status=progress
            mkfs.btrfs -f "${OUTPUT_IMG_003}"
            mount -t btrfs -o compress=zstd:15 "${OUTPUT_IMG_003}" "${BUILD_DIR_003}"
            echo "📋 复制公共基础层到 UFI003..."
            cp -a "${TEMP_DIR}/." "${BUILD_DIR_003}/"

            if [ -f "${SCRIPT_DIR}/firmware_debs/firmware-ufi003.deb" ]; then
              echo "📦 安装 UFI003 专属固件..."
              cp "${SCRIPT_DIR}/firmware_debs/firmware-ufi003.deb" "${BUILD_DIR_003}/tmp/"

              # 修复 UFI003 chroot 的 resolv.conf
              rm -f "${BUILD_DIR_003}/etc/resolv.conf"
              printf "nameserver 223.5.5.5\nnameserver 119.29.29.29\n" \
                > "${BUILD_DIR_003}/etc/resolv.conf"

              mount --bind /proc "${BUILD_DIR_003}/proc"
              mount --bind /dev "${BUILD_DIR_003}/dev"
              mount --bind /sys "${BUILD_DIR_003}/sys"

              for i in 1 2 3; do
                if chroot "${BUILD_DIR_003}" bash -c "dpkg -i /tmp/firmware-ufi003.deb"; then
                  echo "✅ UFI003 固件安装成功"
                  break
                fi
                echo "⚠️  固件安装第 ${i}/3 次重试..."
                chroot "${BUILD_DIR_003}" bash -c "apt-get --fix-broken install -y" || true
                rm -f "${BUILD_DIR_003}/etc/resolv.conf"
                printf "nameserver 223.5.5.5\nnameserver 119.29.29.29\n" \
                  > "${BUILD_DIR_003}/etc/resolv.conf"
              done

              umount "${BUILD_DIR_003}/proc" "${BUILD_DIR_003}/dev" "${BUILD_DIR_003}/sys" || true
            else
              echo "⚠️  未找到 firmware-ufi003.deb，跳过固件安装"
            fi

            chroot "${BUILD_DIR_003}" bash -c \
              "rm -rf /var/lib/apt/lists/* && apt-get clean all" || true
            rm -rf "${BUILD_DIR_003}/tmp"/*
            umount "${BUILD_DIR_003}"
            img2simg "${OUTPUT_IMG_003}" "${SCRIPT_DIR}/rootfs_ufi003.img"
            echo "✅ UFI003 rootfs 构建完成"
          else
            echo "ℹ️  已跳过 UFI003（目标设备: ${TARGET_DEVICE}）"
          fi

          umount "${TEMP_DIR}" || true
          echo ""
          echo "✅ [全部完成] 根文件系统构建流程结束！"
          '

      # ── 步骤 7 ──────────────────────────────────────────────
      - name: 🥾 打包 Boot 镜像（合并内核 + DTB + initrd）
        run: |
          echo "════════════════════════════════════════════════"
          echo "  合并: Image.gz + msm8916-thwc-ufi001c.dtb → boot.img"
          echo "════════════════════════════════════════════════"
          mkdir -p output_dist
          TARGET="${{ inputs.target_device }}"

          if [[ "$TARGET" == "ufi001c" || "$TARGET" == "both" ]]; then
            [ -f rootfs_ufi001c.img ] || { echo "❌ rootfs_ufi001c.img 不存在！"; exit 1; }
          fi
          if [[ "$TARGET" == "ufi003" || "$TARGET" == "both" ]]; then
            [ -f rootfs_ufi003.img ] || { echo "❌ rootfs_ufi003.img 不存在！"; exit 1; }
          fi

          cat kernel_debs/Image.gz kernel_debs/msm8916-thwc-ufi001c.dtb > unified-kernel-dtb
          echo "✅ 内核 + DTB 合并完成 ($(du -sh unified-kernel-dtb | cut -f1))"

          # 优先使用 ufi001c 的 initrd，仅选 ufi003 时用 ufi003 的
          INITRD_FILE="initrd_ufi001c.img"
          [[ "$TARGET" == "ufi003" ]] && INITRD_FILE="initrd_ufi003.img"

          mkbootimg \
            --base 0x80000000 \
            --kernel_offset 0x00080000 \
            --ramdisk_offset 0x02000000 \
            --tags_offset 0x01e00000 \
            --pagesize 2048 \
            --second_offset 0x00f00000 \
            --ramdisk "${INITRD_FILE}" \
            --cmdline "earlycon root=/dev/mmcblk0p14 rootwait console=ttyMSM0,115200 no_framebuffer=true rw" \
            --kernel unified-kernel-dtb \
            -o output_dist/boot.img

          echo "✅ boot.img 打包完成 ($(du -sh output_dist/boot.img | cut -f1))"

          [[ -f rootfs_ufi001c.img ]] && cp rootfs_ufi001c.img output_dist/
          [[ -f rootfs_ufi003.img ]]  && cp rootfs_ufi003.img  output_dist/

          echo "════ output_dist 最终清单 ════"
          ls -lh output_dist/

      # ── 步骤 8 ──────────────────────────────────────────────
      - name: 📦 打包发布压缩包（按设备分包）
        run: |
          echo "════════════════════════════════════════════════"
          echo "  打包目标设备: ${{ inputs.target_device }}"
          echo "════════════════════════════════════════════════"
          VERSION_NAME="${{ matrix.version }}"
          BUILD_TIME=$(date +%Y%m%d_%H%M%S)
          TARGET="${{ inputs.target_device }}"
          cd output_dist

          if [[ "$TARGET" == "ufi001c" || "$TARGET" == "both" ]]; then
            ARCHIVE_001C="Armbian_${VERSION_NAME}_ufi001c_server_${BUILD_TIME}.tar.gz"
            tar -czvf "${ARCHIVE_001C}" boot.img rootfs_ufi001c.img
            mv "${ARCHIVE_001C}" ..
            echo "UFI001C_ARCHIVE=${ARCHIVE_001C}" >> $GITHUB_ENV
            echo "✅ UFI001C: ${ARCHIVE_001C} ($(du -sh ../${ARCHIVE_001C} | cut -f1))"
          fi

          if [[ "$TARGET" == "ufi003" || "$TARGET" == "both" ]]; then
            ARCHIVE_003="Armbian_${VERSION_NAME}_ufi003_server_${BUILD_TIME}.tar.gz"
            tar -czvf "${ARCHIVE_003}" boot.img rootfs_ufi003.img
            mv "${ARCHIVE_003}" ..
            echo "UFI003_ARCHIVE=${ARCHIVE_003}" >> $GITHUB_ENV
            echo "✅ UFI003: ${ARCHIVE_003} ($(du -sh ../${ARCHIVE_003} | cut -f1))"
          fi

          cd ..
          echo "════ 最终产物清单 ════"
          ls -lh *.tar.gz 2>/dev/null || echo "（无压缩包）"

      # ── 步骤 9 ──────────────────────────────────────────────
      - name: 🚀 上传固件到 Release（标签 ${{ needs.get-versions.outputs.tag_name }}）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.get-versions.outputs.tag_name }}"
          name: "MSM8916 Armbian ${{ needs.get-versions.outputs.tag_name }} [${{ inputs.target_device }}]"
          body: |
            ## MSM8916 Armbian 固件

            - **构建时间**: ${{ needs.get-versions.outputs.tag_name }}
            - **目标设备**: ${{ inputs.target_device }}
            - **Armbian 版本**: ${{ matrix.version }}
            - **内核来源**: 本仓库 `kernel_stable` Release

            ## 文件说明

            | 文件 | 用途 |
            |---|---|
            | `boot.img` | 内核 + DTB + initrd，两款设备通用 |
            | `rootfs_ufi001c.img` | UFI001C 根文件系统 |
            | `rootfs_ufi003.img` | UFI003 根文件系统 |

            ## 刷机后支持特性
            - ✅ DAE (eBPF 透明代理)
            - ✅ Docker 容器化

          files: |
            ${{ env.UFI001C_ARCHIVE }}
            ${{ env.UFI003_ARCHIVE }}
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
